<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اختبار قالب المقال — منصة محمود</title>
    <meta
      name="description"
      content="صفحة اختبار قالب المقال الجديد بتصميم النيون الديناميكي."
    />

    <!-- Font Awesome 6 (نفس الموقع) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- ستايلات القالب — مسار نسبي من test/ إلى css/ -->
    <link rel="stylesheet" href="../css/article.css" />

    <style>
      /* خلفية بسيطة للاختبار فقط — مش جزء من القالب */
      body {
        background: #0a0a14;
        margin: 0;
        padding: 24px 12px;
        font-family: "Tajawal", "Cairo", system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- ⬇⬇⬇ جسم المقال — انسخ ما بداخل .post-body فقط عند النشر في admin ⬇⬇⬇ -->
    <main class="post-body">
      <!-- ضع هنا محتوى أي مقال (مثال: محتوى ملف pages/vacation-post-body.html) -->
      <div class="wa3-article" dir="rtl" lang="ar">
        <aside class="wa3-tldr">
          <strong>باختصار:</strong> هذه صفحة اختبار للقالب. استبدل هذا الـ
          <code>div.wa3-article</code> بمحتوى المقال من ملف
          <code>pages/vacation-post-body.html</code>.
        </aside>
        <nav class="wa3-toc" id="wa3Toc"><ol class="wa3-toc-list"></ol></nav>
        <p class="wa3-lead">
          جرّب فتح هذه الصفحة في المتصفح للتأكد من أن الـ css والـ js يعملان قبل
          النشر.
        </p>
        <h2><i class="fas fa-flask"></i> قسم تجريبي</h2>
        <p>إذا ظهر فهرس المحتويات أعلاه تلقائياً، فالقالب يعمل بنجاح.</p>
      </div>
    </main>
    <!-- ⬆⬆⬆ نهاية جسم المقال ⬆⬆⬆ -->

    <!-- سكريبت القالب — مسار نسبي من test/ إلى js/ -->
    <script src="../js/article.js" defer></script>
  </body>
</html>
