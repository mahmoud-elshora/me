    <!-- ! start Script for anyArticle -->
    <script>
      (function () {
        var root = document.querySelector(".wa3-article");
        if (!root || root.dataset.wa3Init === "1") return;
        root.dataset.wa3Init = "1";

        /* 1) فهرس تلقائي من عناوين h2 */
        var toc = root.querySelector("#wa3Toc .wa3-toc-list");
        var headings = root.querySelectorAll("h2");
        if (toc && headings.length) {
          headings.forEach(function (h, i) {
            var id = "wa3-h-" + (i + 1);
            h.id = id;
            var li = document.createElement("li");
            var a = document.createElement("a");
            a.href = "#" + id;
            a.textContent = h.textContent.trim();
            li.appendChild(a);
            toc.appendChild(li);
          });
        } else if (toc) {
          var box = root.querySelector("#wa3Toc");
          if (box) box.style.display = "none";
        }

        /* 2) طي/فتح الفهرس */
        var tocBox = root.querySelector("#wa3Toc");
        var tocToggle = root.querySelector(".wa3-toc-toggle");
        if (tocBox && tocToggle) {
          tocToggle.addEventListener("click", function () {
            tocBox.classList.toggle("is-collapsed");
            var open = !tocBox.classList.contains("is-collapsed");
            tocToggle.setAttribute("aria-expanded", open ? "true" : "false");
          });
        }

        /* 3) أزرار نسخ الكود */
        root.querySelectorAll(".wa3-code-copy").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var pre = btn.closest(".wa3-code").querySelector("pre");
            var text = pre ? pre.innerText : "";
            try {
              navigator.clipboard.writeText(text).then(function () {
                var old = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
                setTimeout(function () {
                  btn.innerHTML = old;
                }, 1600);
              });
            } catch (e) {
              /* تجاهل */
            }
          });
        });
      })();
      //  the script to open items
      document.addEventListener("DOMContentLoaded", () => {
        const toc = document.querySelector(".wa3-toc-list");
        const headings = document.querySelectorAll(".wa3-article h2");
        const toggleBtn = document.querySelector(".wa3-toc-toggle");

        headings.forEach((heading, index) => {
          const id = `section-${index + 1}`;
          heading.id = id;

          const li = document.createElement("li");

          li.innerHTML = `
      <a href="#${id}">
        ${heading.textContent}
      </a>
    `;

          toc.appendChild(li);
        });

        toggleBtn.addEventListener("click", () => {
          toc.classList.toggle("closed");

          const isClosed = toc.classList.contains("closed");

          toc.style.display = isClosed ? "none" : "block";

          toggleBtn.setAttribute("aria-expanded", !isClosed);

          toggleBtn.innerHTML = isClosed
            ? '<i class="fas fa-chevron-down"></i>'
            : '<i class="fas fa-chevron-up"></i>';
        });
      });
    </script>

          var(--neon-green)

        display: flex;

        font-weight: 700;
        color: var(--text-primary);

        font-size: 0.78rem;

      }
      .post-body {
        font-size: 1rem;
        color: var(--text-secondary);
        line-height: 1.9;
      }
      .post-body h2 {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--text-primary);
        margin: 2.5rem 0 1rem;
      }
      .post-body h3 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--neon-cyan);
        margin: 2rem 0 0.75rem;
      }
      .post-body p {

    </style>
    <link rel="stylesheet" href="../CSS/mobile-responsive.css" />
  </head>
  <body data-page="blog-post">
    <div id="loader" class="loader">
      <div class="loader-inner">
        <div class="loader-logo" style="font-size: 1.5rem">00</div>
        <div class="loader-bar"><span></span></div>
      </div>
    </div>

    <!-- Post Hero -->
    <div class="post-hero">
      <div class="post-container">
        <div
          class="breadcrumb"
          style="justify-content: flex-start; margin-bottom: 2rem"
        >
          <a href="../index.html">الرئيسية</a>
          <span class="breadcrumb-sep"
            ><i class="fas fa-chevron-left"></i
          ></span>
          <a href="blog.html">المدونة</a>
          <span class="breadcrumb-sep"
            ><i class="fas fa-chevron-left"></i
          ></span>
          <span id="postBreadcrumb">المقال</span>
        </div>
        <div class="post-meta-bar">
          <span class="post-cat-badge" id="postCategory">مقالاتي</span>
          <span
            ><i class="fas fa-calendar"></i>
            <span id="postDate">جاري التحميل...</span></span
          >
          <span><i class="fas fa-user"></i> محمود الشوري</span>
        </div>
        <h1 class="post-title" id="postTitle">جاري تحميل المقال...</h1>
      </div>
    </div>

    <!-- Post Content -->
    <div class="post-container" style="padding-top: 3rem; padding-bottom: 6rem">
      <!-- Author -->
      <div class="post-author">
        <div class="post-author-avatar">م</div>
        <div>
          <div class="post-author-name">محمود أحمد الشوري</div>
          <div class="post-author-role">
            طالب مثالي • مؤسس مبادرة وعينا • كفر الشيخ، مصر
          </div>
        </div>
      </div>

      <!-- Body — يُملأ ديناميكياً -->
      <div class="post-body" id="postBody">
        <p
          class="skeleton"
          style="height: 1rem; width: 80%; margin-bottom: 1rem"
        ></p>
        <p
          class="skeleton"
          style="height: 1rem; width: 95%; margin-bottom: 1rem"
        ></p>
        <p
          class="skeleton"
          style="height: 1rem; width: 70%; margin-bottom: 1rem"
        ></p>
      </div>

      <!-- Share -->
      <div class="post-share">
        <span>شارك المقال:</span>
        <a
          id="shareWa"
          href="#"
          target="_blank"
          class="share-btn"
          style="color: #25d366; border-color: rgba(37, 211, 102, 0.3)"
        >
          <i class="fab fa-whatsapp"></i>
        </a>
        <button class="share-btn" onclick="copyLink()">
          <i class="fas fa-link"></i>
        </button>
        <button class="share-btn" onclick="window.print()">
          <i class="fas fa-print"></i>
        </button>
      </div>

      <!-- Back -->
      <div style="margin-top: 3rem">
        <a href="blog.html" class="btn btn-secondary">
          <i class="fas fa-arrow-right"></i> العودة للمدونة
        </a>
      </div>
    </div>

    <script src="../JS/components.js"></script>
    <script>
      async function loadFullPost() {
        const postId = new URLSearchParams(window.location.search).get("id");
        if (!postId) {
          document.getElementById("postTitle").textContent =
            "لم يُحدَّد معرّف المقال";
          document.getElementById("postBody").innerHTML =
            '<p style="color:var(--neon-violet);">الرابط غير صحيح.</p>';
          return;
        }

        try {
          const res = await fetch(`/api/post-details/${postId}`);
          if (!res.ok) throw new Error("not found");
          const post = await res.json();

          /* ── تحديث الصفحة ── */
          document.title = post.title + " | مدونة محمود الشوري";
          document.getElementById("postTitle").textContent = post.title;
          document.getElementById("postBreadcrumb").textContent =
            post.title.slice(0, 30) + "…";
          document.getElementById("postDate").textContent = post.date || "";
          document.getElementById("postBody").innerHTML =
            post.content || "<p>لا يوجد محتوى.</p>";

          /* ── رابط واتساب ── */
          const waText = encodeURIComponent(
            `اقرأ هذا المقال: ${post.title}\n${window.location.href}`
          );
          document.getElementById(
            "shareWa"
          ).href = `https://wa.me/?text=${waText}`;
        } catch (err) {
          console.error("Error loading post:", err);
          document.getElementById("postTitle").textContent =
            "تعذّر تحميل المقال";
          document.getElementById("postBody").innerHTML =
            '<p style="color:var(--neon-violet);">تأكد من تشغيل السيرفر وصحة الرابط.</p>';
        }
      }

      function copyLink() {
        navigator.clipboard
          .writeText(window.location.href)
          .then(() => showToast("✅ تم نسخ الرابط!"))
          .catch(() => showToast("⚠️ تعذّر النسخ"));
      }

      document.addEventListener("DOMContentLoaded", loadFullPost);
    </script>

    <!-- v16: admin-overlay (fetches dynamic extras for this page) -->
    <script src="../JS/admin-overlay.js" defer></script>
  </body>
</html>
