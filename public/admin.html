<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة التحكم | وعينا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="page-common.css"/>

<style>
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.tab-btn{padding:10px 14px;border-radius:10px;border:1px solid #333;background:#111;color:#fff;cursor:pointer}
.tab-btn.active{background:cyan;color:#000;font-weight:bold}
.section{display:none}
.section.active{display:block}
.admin-box{max-width:800px;margin:auto;padding:20px;background:#111;border-radius:12px;margin-bottom:20px}
:root{
  --card:#0f1720;
  --card2:#111827;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#00e5ff;
}

/* ===== GENERAL ===== */
body{
  font-family:"Cairo",sans-serif;
}

/* ===== INPUTS ===== */
.form-input{
  width:100%;
  padding:12px 14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  outline:none;
  transition:.2s;
}

.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,229,255,0.15);
}

/* ===== ADMIN BOX ===== */
.admin-box{
  max-width:800px;
  margin:auto;
  padding:20px;
  border-radius:16px;
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* ===== BUTTONS ===== */
button{
  cursor:pointer;
  transition:.2s;
}

.btn{
  padding:12px 16px;
  border:none;
  border-radius:12px;
  font-weight:600;
}

.btn-primary{
  background:linear-gradient(135deg,#00e5ff,#00c6ff);
  color:#000;
  box-shadow:0 10px 20px rgba(0,229,255,0.15);
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 25px rgba(0,229,255,0.25);
}

/* ===== BLOG CARDS ===== */
.blog-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  transition:.25s;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.blog-card:hover{
  transform:translateY(-4px);
  border-color:rgba(0,229,255,0.3);
}

/* ===== ACTION BUTTONS ===== */
.blog-card button{
  padding:7px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  font-size:13px;
}

.blog-card button:hover{
  background:rgba(255,255,255,0.05);
  border-color:var(--accent);
}

/* delete button */
.blog-card button[style*="red"]{
  border-color:rgba(255,0,0,0.3);
}

.blog-card button[style*="red"]:hover{
  background:rgba(255,0,0,0.1);
}
</style>

</head>

<body data-page="admin">

<button onclick="logout()"
style="position:fixed;bottom:15px;left:15px;background:red;color:#fff;padding:10px;border:none;border-radius:10px;z-index:999">
تسجيل خروج
</button>

<section class="page-hero">
<h1>لوحة التحكم</h1>
<p>إدارة كاملة للموقع</p>
</section>

<div class="page-content">

<!-- TABS -->
<div class="tabs">
<button class="tab-btn active" onclick="showTab('blog')">📝 Blog</button>
<button class="tab-btn" onclick="showTab('community')">👥 Community</button>
<button class="tab-btn" onclick="showTab('testimonials')">⭐ Testimonials</button>
</div>

<!-- ================= BLOG ================= -->
<div id="blog" class="section active">

<h2>إدارة المقالات</h2>

<div class="admin-box">
<input id="title" class="form-input" placeholder="العنوان">
<input id="excerpt" class="form-input" placeholder="نبذة">
<input id="icon" class="form-input" placeholder="icon fas fa-code">
<textarea id="content" class="form-input" placeholder="المحتوى"></textarea>

<button class="btn btn-primary" onclick="saveBlog()">حفظ</button>
</div>

<div id="blogGrid" class="blog-grid"></div>
</div>

<!-- ================= COMMUNITY ================= -->
<div id="community" class="section">
<h2>Community</h2>
<div id="communityGrid" class="blog-grid"></div>
</div>

<!-- ================= TESTIMONIALS ================= -->
<div id="testimonials" class="section">
<h2>Testimonials</h2>
<div id="testimonialsGrid" class="blog-grid"></div>
</div>

</div>

<script>

if(!localStorage.getItem("admin-token")){
location.href="login.html";
}

const token = localStorage.getItem("admin-token");
let editId=null;

/* ================= TABS ================= */
function showTab(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
event.target.classList.add('active');
}

/* ================= BLOG ================= */
async function loadBlogs(){
const res=await fetch('/api/posts?type=admin');
const data=await res.json();

blogGrid.innerHTML=data.map(itemCard('blog')).join('');
}

/* ================= COMMUNITY ================= */
async function loadCommunity(){
const res=await fetch('/api/posts?type=guest');
const data=await res.json();

communityGrid.innerHTML=data.map(itemCard('community')).join('');
}

/* ================= TESTIMONIALS ================= */
async function loadTestimonials(){
const res=await fetch('/api/testimonials');
const data=await res.json();

testimonialsGrid.innerHTML=data.map(itemCard('testimonials')).join('');
}

/* ================= CARD SYSTEM ================= */
function itemCard(type){
return function(item){
return `
<div class="blog-card">

<h3>${item.title || item.name}</h3>
<p>${item.excerpt || item.message || ''}</p>

<div style="display:flex;gap:8px;flex-wrap:wrap">

<button onclick="editItem('${type}','${item.id}')">✏️</button>
<button onclick="deleteItem('${type}','${item.id}')" style="color:red">🗑</button>
<button onclick="approveItem('${type}','${item.id}')">✔</button>
<button onclick="togglePublish('${type}','${item.id}',${item.published})">👁</button>

</div>
</div>
`;
}
}

/* ================= BLOG SAVE ================= */
async function saveBlog(){

const body={
title:title.value,
excerpt:excerpt.value,
content:content.value,
icon:icon.value,
published:true
};

const url=editId?`/api/blog/${editId}`:'/api/blog';
const method=editId?'PUT':'POST';

await fetch(url,{
method,
headers:{
'Content-Type':'application/json',
'Authorization':token
},
body:JSON.stringify(body)
});

editId=null;
loadBlogs();
}

/* ================= ACTIONS ================= */
async function deleteItem(type,id){
await fetch(`/api/${type}/${id}`,{
method:'DELETE',
headers:{Authorization:token}
});
reload();
}

async function approveItem(type,id){
await fetch(`/api/${type}/approve/${id}`,{
method:'PUT',
headers:{Authorization:token}
});
reload();
}

async function togglePublish(type,id,state){
await fetch(`/api/${type}/${id}`,{
method:'PUT',
headers:{
'Content-Type':'application/json',
Authorization:token
},
body:JSON.stringify({published:!state})
});
reload();
}

/* ================= EDIT ================= */
function editItem(type,id){
alert("ضيف logic edit لو حابب نكمله");
}

/* ================= RELOAD ================= */
function reload(){
loadBlogs();
loadCommunity();
loadTestimonials();
}

/* ================= LOGOUT ================= */
function logout(){
localStorage.removeItem("admin-token");
location.href="login.html";
}

/* ================= INIT ================= */
document.addEventListener('DOMContentLoaded',()=>{
reload();
});

</script>

</body>
</html>
