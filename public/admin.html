<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم | وعينا</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="page-common.css"/>

  <style>
    .tabs {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .tab-btn{
      padding:10px 15px;
      border-radius:10px;
      border:1px solid var(--border-color);
      background:var(--bg-glass);
      cursor:pointer;
      color:var(--text-primary);
    }

    .tab-btn.active{
      background:var(--neon-cyan);
      color:#000;
      font-weight:bold;
    }

    .section{display:none;}
    .section.active{display:block;}

    .admin-box{
      max-width:800px;
      margin:auto;
      background:var(--bg-glass);
      border:1px solid var(--border-color);
      padding:2rem;
      border-radius:15px;
      margin-bottom:20px;
    }
  </style>
</head>

<body data-page="admin">

<button onclick="logout()"
style="position:fixed;bottom:15px;left:15px;z-index:999;
background:red;color:#fff;border:none;padding:10px 14px;border-radius:10px;">
تسجيل خروج
</button>

<section class="page-hero">
  <h1>لوحة التحكم</h1>
  <p>إدارة الموقع بالكامل</p>
</section>

<div class="page-content">

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('blog')">📝 Blog</button>
  <button class="tab-btn" onclick="showTab('community')">👥 Community</button>
  <button class="tab-btn" onclick="showTab('testimonials')">⭐ Testimonials</button>
  <button class="tab-btn" onclick="showTab('contacts')">📩 Contacts</button>
</div>

<!-- ================= BLOG ================= -->
<div id="blog" class="section active">

<h2>إدارة المقالات</h2>

<div class="admin-box">
  <input id="title" class="form-input" placeholder="عنوان المقال">
  <input id="excerpt" class="form-input" placeholder="نبذة">
  <input id="icon" class="form-input" placeholder="icon fas fa-code">
  <textarea id="content" class="form-input" placeholder="المحتوى"></textarea>

  <button class="btn btn-primary btn-full" onclick="saveBlog()">➕ حفظ</button>
</div>

<div id="blogGrid" class="blog-grid"></div>

</div>

<!-- ================= COMMUNITY ================= -->
<div id="community" class="section">
  <h2>مقالات المجتمع</h2>
  <div id="communityGrid" class="blog-grid"></div>
</div>

<!-- ================= TESTIMONIALS ================= -->
<div id="testimonials" class="section">
  <h2>الشهادات</h2>
  <div id="testimonialsGrid" class="blog-grid"></div>
</div>

<!-- ================= CONTACT ================= -->
<div id="contacts" class="section">
  <h2>الرسائل</h2>
  <div id="contactsGrid" class="blog-grid"></div>
</div>

</div>

<script>
if(!localStorage.getItem("admin-token")){
  window.location.href="login.html";
}

const token = localStorage.getItem("admin-token");
let editId = null;

/* ================= TABS ================= */
function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

/* ================= BLOG ================= */
async function loadBlogs(){
  const res = await fetch('/api/posts?type=admin');
  const data = await res.json();

  document.getElementById('blogGrid').innerHTML = data.map(p=>`
    <div class="blog-card">
      <div class="blog-card-img">
        <i class="${p.icon || 'fas fa-pen-fancy'}"></i>
      </div>

      <div class="blog-card-body">
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>

        <button onclick="editBlog('${p.id}','${p.title}','${p.excerpt}','${p.content}','${p.icon || ''}')">✏️</button>
        <button style="color:red" onclick="deleteBlog('${p.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function editBlog(id,t,e,c,i){
  editId=id;
  title.value=t;
  excerpt.value=e;
  content.value=c;
  icon.value=i;
}

async function saveBlog(){
  const body={
    title:title.value,
    excerpt:excerpt.value,
    content:content.value,
    icon:icon.value
  };

  const url = editId ? `/api/blog/${editId}` : '/api/blog';
  const method = editId ? 'PUT' : 'POST';

  await fetch(url,{
    method,
    headers:{
      'Content-Type':'application/json',
      'Authorization':token
    },
    body:JSON.stringify(body)
  });

  editId=null;
  loadBlogs();
}

/* ================= COMMUNITY ================= */
async function loadCommunity(){
  const res = await fetch('/api/posts?type=guest');
  const data = await res.json();

  document.getElementById('communityGrid').innerHTML = data.map(p=>`
    <div class="blog-card">
      <h3>${p.title}</h3>
      <p>${p.excerpt}</p>

      <button onclick="approve('${p.id}')">✔</button>
      <button style="color:red" onclick="deleteC('${p.id}')">🗑</button>
    </div>
  `).join('');
}

async function approve(id){
  await fetch('/api/community/approve/'+id,{method:'PUT',headers:{Authorization:token}});
  loadCommunity();
}

async function deleteC(id){
  await fetch('/api/community/'+id,{method:'DELETE',headers:{Authorization:token}});
  loadCommunity();
}

/* ================= TESTIMONIALS ================= */
async function loadTestimonials(){
  const res = await fetch('/api/testimonials');
  const data = await res.json();

  document.getElementById('testimonialsGrid').innerHTML = data.map(t=>`
    <div class="blog-card">
      <input id="n-${t.id}" value="${t.name}">
      <textarea id="m-${t.id}">${t.message}</textarea>

      <button onclick="updateT('${t.id}')">✏️</button>
      <button style="color:red" onclick="deleteT('${t.id}')">🗑</button>
    </div>
  `).join('');
}

async function updateT(id){
  await fetch('/api/testimonials/'+id,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:document.getElementById('n-'+id).value,
      message:document.getElementById('m-'+id).value
    })
  });

  loadTestimonials();
}

/* ================= CONTACTS ================= */
async function loadContacts(){
  const res = await fetch('/api/contacts');
  const data = await res.json();

  document.getElementById('contactsGrid').innerHTML = data.map(c=>`
    <div class="blog-card">
      <h3>${c.name}</h3>
      <p>${c.message}</p>

      <button style="color:red" onclick="deleteContact('${c.id}')">🗑</button>
    </div>
  `).join('');
}

/* ================= DELETE ================= */
async function deleteBlog(id){
  await fetch('/api/blog/'+id,{method:'DELETE',headers:{Authorization:token}});
  loadBlogs();
}

async function deleteT(id){
  await fetch('/api/testimonials/'+id,{method:'DELETE'});
  loadTestimonials();
}

async function deleteContact(id){
  await fetch('/api/contact/'+id,{method:'DELETE'});
  loadContacts();
}

function logout(){
  localStorage.removeItem("admin-token");
  location.href="login.html";
}

/* INIT */
document.addEventListener('DOMContentLoaded',()=>{
  loadBlogs();
  loadCommunity();
  loadTestimonials();
  loadContacts();
});
</script>

</body>
</html>
