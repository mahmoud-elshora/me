<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* ================= DESIGN SYSTEM ================= */
:root{
  --bg:#0b0f14;
  --card:#121821;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#00e5ff;
  --danger:#ff3b3b;
  --ok:#22c55e;
}

/* ================= BASE ================= */
body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:var(--text);
}

h2{
  margin:20px 0;
  text-align:center;
}

/* ================= LAYOUT ================= */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:15px;
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:15px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

/* ================= INPUT ================= */
input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f141b;
  color:white;
  outline:none;
}

input:focus,textarea:focus{
  border-color:var(--accent);
}

/* ================= BUTTONS ================= */
.btn{
  padding:8px 12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  margin:3px;
  font-size:13px;
}

.primary{background:var(--accent);color:#000;}
.danger{background:var(--danger);color:#fff;}
.ok{background:var(--ok);color:#000;}
.gray{background:#222;color:#fff;}

/* ================= NAV ================= */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tabs button{
  padding:10px 15px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.tabs button.active{
  background:var(--accent);
  color:#000;
}

/* ================= SECTION ================= */
.section{display:none;}
.section.active{display:block;}

</style>
</head>

<body>

<div class="container">

<h2>⚙️ Admin Dashboard</h2>

<!-- NAV -->
<div class="tabs">
<button onclick="show('blog')" class="active">Blog</button>
<button onclick="show('community')">Community</button>
<button onclick="show('testimonials')">Testimonials</button>
<button onclick="show('contacts')">Contacts</button>
</div>

<!-- ================= BLOG ================= -->
<div id="blog" class="section active">

<input id="title" placeholder="Title">
<input id="excerpt" placeholder="Excerpt">
<input id="icon" placeholder="Icon">
<textarea id="content" placeholder="Content"></textarea>

<button class="btn primary" onclick="saveBlog()">Save</button>

<div id="blogGrid" class="grid"></div>
</div>

<!-- ================= COMMUNITY ================= -->
<div id="community" class="section">
<div id="communityGrid" class="grid"></div>
</div>

<!-- ================= TESTIMONIALS ================= -->
<div id="testimonials" class="section">
<div id="testimonialsGrid" class="grid"></div>
</div>

<!-- ================= CONTACTS ================= -->
<div id="contacts" class="section">
<div id="contactsGrid" class="grid"></div>
</div>

</div>

<script>

const token=localStorage.getItem("admin-token");

let editId=null;

/* ================= NAV ================= */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
event.target.classList.add('active');
}

/* ================= BLOG ================= */
async function loadBlogs(){
const r=await fetch('/api/posts?type=admin');
const d=await r.json();

blogGrid.innerHTML=d.map(c=>card('blog',c)).join('');
}

/* ================= COMMUNITY ================= */
async function loadCommunity(){
const r=await fetch('/api/posts?type=guest');
const d=await r.json();

communityGrid.innerHTML=d.map(c=>card('community',c)).join('');
}

/* ================= TEST ================= */
async function loadTestimonials(){
const r=await fetch('/api/testimonials');
const d=await r.json();

testimonialsGrid.innerHTML=d.map(c=>card('testimonials',c)).join('');
}

/* ================= CONTACT ================= */
async function loadContacts(){
const r=await fetch('/api/contacts');
const d=await r.json();

contactsGrid.innerHTML=d.map(c=>card('contacts',c)).join('');
}

/* ================= CARD SYSTEM ================= */
function card(type,item){
return `
<div class="card">

<h3>${item.title||item.name}</h3>
<p>${item.excerpt||item.message||''}</p>

<div>
<button class="btn ok" onclick="approve('${type}','${item.id}')">✔</button>
<button class="btn danger" onclick="del('${type}','${item.id}')">🗑</button>
<button class="btn gray" onclick="toggle('${type}','${item.id}',${item.published})">👁</button>
</div>

</div>
`;
}

/* ================= ACTIONS ================= */
async function del(type,id){
await fetch(`/api/${type}/${id}`,{method:'DELETE',headers:{Authorization:token}});
reload();
}

async function approve(type,id){
await fetch(`/api/${type}/approve/${id}`,{method:'PUT',headers:{Authorization:token}});
reload();
}

async function toggle(type,id,val){
await fetch(`/api/${type}/${id}`,{
method:'PUT',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({published:!val})
});
reload();
}

/* ================= BLOG SAVE ================= */
async function saveBlog(){

await fetch('/api/blog',{
method:'POST',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({
title:title.value,
excerpt:excerpt.value,
content:content.value,
icon:icon.value
})
});

reload();
}

/* ================= RELOAD ================= */
function reload(){
loadBlogs();
loadCommunity();
loadTestimonials();
loadContacts();
}

reload();

</script>

</body>
</html>
