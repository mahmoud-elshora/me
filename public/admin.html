<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root{
  --bg:#0b0f14;
  --card:#121821;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#00e5ff;
  --danger:#ff3b3b;
  --ok:#22c55e;
}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{max-width:1100px;margin:auto;padding:20px;}

h2{text-align:center;}

.tabs{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}

.tabs button{
  padding:10px 15px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
}

.tabs button.active{background:var(--accent);color:#000;}

.section{display:none;}
.section.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:15px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.icon{
  font-size:30px;
  margin-bottom:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f141b;
  color:white;
}

.btn{
  padding:6px 10px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  margin:3px;
  font-size:12px;
}

.primary{background:var(--accent);color:#000;}
.danger{background:var(--danger);color:#fff;}
.ok{background:var(--ok);color:#000;}
.gray{background:#222;color:#fff;}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  width:400px;
}
</style>
</head>

<body>

<div class="container">

<h2>⚙️ Admin Dashboard</h2>

<div class="tabs">
<button class="active" onclick="show('blog',event)">Blog</button>
<button onclick="show('community',event)">Community</button>
<button onclick="show('testimonials',event)">Testimonials</button>
<button onclick="show('contacts',event)">Contacts</button>
</div>

<!-- BLOG -->
<div id="blog" class="section active">

<input id="title" placeholder="Title">
<input id="excerpt" placeholder="Excerpt">
<input id="icon" placeholder="Icon (fa-solid fa-...)">
<textarea id="content" placeholder="Content"></textarea>

<button class="btn primary" onclick="saveBlog()">Save</button>

<div id="blogGrid" class="grid"></div>
</div>

<!-- OTHERS -->
<div id="community" class="section"><div id="communityGrid" class="grid"></div></div>
<div id="testimonials" class="section"><div id="testimonialsGrid" class="grid"></div></div>
<div id="contacts" class="section"><div id="contactsGrid" class="grid"></div></div>

</div>

<!-- MODAL EDIT -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Edit Post</h3>
    <input id="editTitle">
    <input id="editExcerpt">
    <input id="editIcon">
    <textarea id="editContent"></textarea>
    <button class="btn primary" onclick="updatePost()">Save</button>
    <button class="btn gray" onclick="closeModal()">Close</button>
  </div>
</div>

<script>

const token = localStorage.getItem("admin-token");

let currentEdit = {type:null,id:null};

/* NAV */
function show(id,e){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
e.target.classList.add('active');
}

/* CARD */
function card(type,item){
return `
<div class="card">

<div class="icon"><i class="${item.icon || 'fa-solid fa-file'}"></i></div>

<h3>${item.title || item.name}</h3>
<p>${item.excerpt || item.message || ''}</p>

<button class="btn ok" onclick="approve('${type}','${item.id}')">Approve</button>
<button class="btn danger" onclick="del('${type}','${item.id}')">Delete</button>
<button class="btn gray" onclick="toggle('${type}','${item.id}',${item.published})">Hide</button>
<button class="btn primary" onclick='edit("${type}",${JSON.stringify(item)})'>Edit</button>

</div>
`;
}

/* LOAD */
async function loadBlogs(){
let r=await fetch('/api/posts?type=admin');
let d=await r.json();
blogGrid.innerHTML=d.map(c=>card('blog',c)).join('');
}

async function loadCommunity(){
let r=await fetch('/api/posts?type=guest');
let d=await r.json();
communityGrid.innerHTML=d.map(c=>card('community',c)).join('');
}

async function loadTestimonials(){
let r=await fetch('/api/testimonials');
let d=await r.json();
testimonialsGrid.innerHTML=d.map(c=>card('testimonials',c)).join('');
}

async function loadContacts(){
let r=await fetch('/api/contacts');
let d=await r.json();
contactsGrid.innerHTML=d.map(c=>card('contacts',c)).join('');
}

/* ACTIONS */
async function del(type,id){
await fetch(`/api/${type}/${id}`,{method:'DELETE',headers:{Authorization:token}});
reload();
}

async function approve(type,id){
await fetch(`/api/${type}/approve/${id}`,{method:'PUT',headers:{Authorization:token}});
reload();
}

async function toggle(type,id,val){
await fetch(`/api/${type}/${id}`,{
method:'PUT',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({published:!val})
});
reload();
}

/* BLOG SAVE */
async function saveBlog(){
await fetch('/api/blog',{
method:'POST',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({
title:title.value,
excerpt:excerpt.value,
content:content.value,
icon:icon.value
})
});
reload();
}

/* EDIT */
function edit(type,item){
currentEdit = {type,id:item.id};

editTitle.value = item.title || '';
editExcerpt.value = item.excerpt || '';
editIcon.value = item.icon || '';
editContent.value = item.content || '';

modal.style.display='flex';
}

function closeModal(){
modal.style.display='none';
}

async function updatePost(){
await fetch(`/api/${currentEdit.type}/${currentEdit.id}`,{
method:'PUT',
headers:{
'Content-Type':'application/json',
Authorization:token
},
body:JSON.stringify({
title:editTitle.value,
excerpt:editExcerpt.value,
icon:editIcon.value,
content:editContent.value
})
});

closeModal();
reload();
}

/* RELOAD */
function reload(){
loadBlogs();
loadCommunity();
loadTestimonials();
loadContacts();
}

reload();

</script>

</body>
</html>
