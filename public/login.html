<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول — Perfect Claude</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0e27 0%,#1a1a3e 50%,#0a0e27 100%);font-family:Cairo,sans-serif;color:#fff;padding:20px}
  .login-box{width:100%;max-width:420px;background:rgba(15,23,42,.75);backdrop-filter:blur(18px);border:1px solid rgba(0,240,255,.3);border-radius:22px;padding:40px 32px;box-shadow:0 18px 60px rgba(0,0,0,.5)}
  .login-box h1{font-family:Orbitron;color:#00f0ff;text-align:center;margin:0 0 6px;font-size:1.6rem;text-shadow:0 0 18px #00f0ff}
  .login-box p.sub{text-align:center;opacity:.7;margin:0 0 26px;font-size:.9rem}
  .login-box .field{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
  .login-box label{font-size:.85rem;color:#9bd0ff;font-weight:700}
  .login-box input{background:rgba(0,0,0,.45);border:1px solid rgba(0,240,255,.3);color:#fff;padding:13px 16px;border-radius:10px;font-family:Cairo;font-size:.95rem;width:100%;box-sizing:border-box}
  .login-box input:focus{outline:none;border-color:#00f0ff;box-shadow:0 0 14px rgba(0,240,255,.4)}
  .login-box button{width:100%;padding:13px;border:none;border-radius:10px;background:#00f0ff;color:#000;font-weight:700;cursor:pointer;font-size:1rem;font-family:Cairo;margin-top:8px;transition:.25s;box-shadow:0 0 24px rgba(0,240,255,.4)}
  .login-box button:hover{transform:translateY(-2px)}
  .login-box button:disabled{opacity:.6;cursor:wait}
  .msg{padding:12px;border-radius:10px;margin-top:14px;display:none;font-weight:600;text-align:center}
  .msg.err{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid #ef4444;display:block}
  .back{display:block;text-align:center;margin-top:18px;color:#00f0ff;text-decoration:none;font-size:.9rem}
</style>
</head>
<body>
<div class="login-box">
  <h1><i class="fas fa-shield-alt"></i> دخول الأدمن</h1>
  <p class="sub">منطقة محمية — للمشرفين فقط</p>
  <div class="field"><label>اسم المستخدم</label><input id="user" autocomplete="username"></div>
  <div class="field"><label>كلمة المرور</label><input id="pass" type="password" autocomplete="current-password"></div>
  <button id="btn">دخول</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="index.html"><i class="fas fa-arrow-right"></i> الرجوع للموقع</a>
</div>

<script>
'use strict';
var btn = document.getElementById('btn');
var msg = document.getElementById('msg');

if (localStorage.getItem('admin-token')) {
  /* تأكد من صلاحية التوكن قبل التحويل */
  fetch('/api/auth/me', { credentials: 'same-origin', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('admin-token') } })
    .then(function (r) { return r.json(); })
    .then(function (j) { if (j.user) location.href = 'admin.html'; });
}

function show(t) { msg.textContent = t; msg.className = 'msg err'; }

function login() {
  var u = document.getElementById('user').value.trim();
  var p = document.getElementById('pass').value;
  if (!u || !p) return show('اكتب البيانات كاملة');
  btn.disabled = true; btn.textContent = 'جارٍ الدخول…';
  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ username: u, password: p })
  }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (res) {
      if (res.ok && res.j.success) {
        localStorage.setItem('admin-token', res.j.token);
        location.href = 'admin.html';
      } else {
        show(res.j.message || 'بيانات غير صحيحة');
        btn.disabled = false; btn.textContent = 'دخول';
      }
    }).catch(function () {
      show('فشل الاتصال بالسيرفر');
      btn.disabled = false; btn.textContent = 'دخول';
    });
}

btn.onclick = login;
document.getElementById('pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') login(); });
document.getElementById('user').addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('pass').focus(); });
</script>
</body>
</html>
